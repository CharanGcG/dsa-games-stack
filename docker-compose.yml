services:
  mongo:
    image: mongo:7
    container_name: dsa-games-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  backend:
    build:
      context: ./backend
    container_name: dsa-games-api
    restart: unless-stopped
    depends_on:
      - mongo
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/dsa-games
      CORS_ORIGINS: http://localhost:8080,http://127.0.0.1:8080
      ACCESS_TOKEN_SECRET: local-docker-access-secret-change-before-deploy-64-characters
      REFRESH_TOKEN_SECRET: local-docker-refresh-secret-change-before-deploy-64-characters
      ACCESS_TOKEN_TTL_SECONDS: 900
      REFRESH_TOKEN_TTL_SECONDS: 2592000

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:5000/api
    container_name: dsa-games-web
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  mongo-data:
